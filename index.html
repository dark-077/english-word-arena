<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语单词PK大擂台</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --p1: #ff3b5c;
  --p1-light: #ff6b8b;
  --p1-bg: #ff3b5c20;
  --p2: #3399ff;
  --p2-light: #66b2ff;
  --p2-bg: #3399ff20;
  --p3: #00e676;
  --p3-light: #33ff99;
  --p3-bg: #00e67620;
  --p4: #ff9100;
  --p4-light: #ffb233;
  --p4-bg: #ff910020;
  --bg: #f5f7fa;
  --surface: #ffffff;
  --surface2: #f0f2f5;
  --text: #333333;
  --text-dim: #666666;
  --gold: #ffd700;
  --gold-glow: #ffd70060;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  user-select: none;
}

/* ============ SCREENS ============ */
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.screen.hidden {
  opacity: 0; pointer-events: none;
  transform: scale(0.95);
}

/* ============ START SCREEN ============ */
#start-screen {
  background: radial-gradient(ellipse at center, #1a1a3a 0%, #0a0a14 70%);
}
.start-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(2.5rem, 6vw, 5rem);
  font-weight: 900;
  background: linear-gradient(135deg, #ff3b5c, #ff9100, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  margin-bottom: 0.5rem;
  letter-spacing: 0.05em;
}
.start-subtitle {
  font-size: 1.1rem;
  color: var(--text-dim);
  margin-bottom: 3rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
}
.player-count-selector {
  display: flex; gap: 1rem; margin-bottom: 2rem;
}
.count-btn {
  width: 64px; height: 64px;
  border-radius: 16px;
  border: 2px solid #ffffff20;
  background: var(--surface);
  color: var(--text);
  font-family: 'Orbitron', sans-serif;
  font-size: 1.5rem; font-weight: 700;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
}
.count-btn:hover { border-color: #ffffff50; transform: translateY(-2px); }
.count-btn.active {
  border-color: var(--gold);
  background: #ffd70010;
  box-shadow: 0 0 24px var(--gold-glow);
  color: var(--gold);
}
.name-inputs {
  display: flex; flex-direction: column; gap: 0.75rem;
  margin-bottom: 2rem; width: 100%; max-width: 360px;
}
.name-row {
  display: flex; align-items: center; gap: 0.75rem;
}
.name-row .dot {
  width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
}
.name-row input {
  flex: 1;
  padding: 0.75rem 1rem;
  border-radius: 10px;
  border: 2px solid #ffffff15;
  background: var(--surface);
  color: var(--text);
  font-size: 1rem;
  font-family: 'Noto Sans SC', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.name-row input:focus { border-color: #ffffff40; }
.name-row input::placeholder { color: #555; }
.start-btn {
  padding: 1rem 3rem;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg, #ff3b5c, #ff9100);
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-size: 1.3rem; font-weight: 700;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 30px #ff3b5c40;
}
.start-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 40px #ff3b5c60;
}
.start-btn:active { transform: translateY(0); }

/* ============ GAME SCREEN ============ */
#game-screen {
  background: radial-gradient(ellipse at center, #1a1a3a 0%, #0a0a14 70%);
  padding: 1.5rem;
}
.game-top-bar {
  position: absolute; top: 1rem; left: 1.5rem; right: 1.5rem;
  display: flex; justify-content: space-between; align-items: center;
  z-index: 10;
  pointer-events: none;
}
.round-indicator {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.9rem;
  color: var(--text-dim);
  letter-spacing: 0.15em;
}
.round-indicator span { color: var(--gold); font-weight: 700; }
.question-zone {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 1.5rem;
  pointer-events: none;
}
.question-label {
  font-size: 0.85rem;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}
.question-word {
  font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 40px #ffffff30;
  letter-spacing: 0.05em;
  line-height: 1.2;
  text-align: center;
}
.timer-ring-container {
  position: relative;
  width: 80px; height: 80px;
  margin: 0.5rem 0;
  pointer-events: none;
}
.timer-ring {
  transform: rotate(-90deg);
  width: 80px; height: 80px;
}
.timer-ring .bg { fill: none; stroke: #ffffff10; stroke-width: 6; }
.timer-ring .fg {
  fill: none; stroke: var(--gold);
  stroke-width: 6; stroke-linecap: round;
  transition: stroke-dashoffset 0.1s linear, stroke 0.3s;
}
.timer-ring .fg.urgent { stroke: #ff3b5c; }
.timer-text {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8rem; font-weight: 700;
  color: #fff;
}
.timer-text.urgent { color: #ff3b5c; animation: pulse 0.5s ease infinite; }
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

.players-grid {
  display: grid;
  gap: 1rem;
  width: 100%;
  max-width: 1200px;
  flex: 1;
}
.players-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.players-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.players-grid.cols-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

.player-card {
  background: var(--surface);
  border-radius: 20px;
  border: 2px solid #ffffff10;
  padding: 1.25rem;
  display: flex; flex-direction: column;
  align-items: center; gap: 0.75rem;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.player-card::before {
  content: '';
  position: absolute; inset: 0;
  opacity: 0; transition: opacity 0.3s;
  border-radius: 20px;
  pointer-events: none;
}
.player-card.p1 { border-color: var(--p1); }
.player-card.p2 { border-color: var(--p2); }
.player-card.p3 { border-color: var(--p3); }
.player-card.p4 { border-color: var(--p4); }
.player-card.active {
  box-shadow: 0 0 24px var(--p1);
  border-color: var(--p1);
}
.player-card.p2.active { box-shadow: 0 0 24px var(--p2); border-color: var(--p2); }
.player-card.p3.active { box-shadow: 0 0 24px var(--p3); border-color: var(--p3); }
.player-card.p4.active { box-shadow: 0 0 24px var(--p4); border-color: var(--p4); }
.player-card.correct-flash {
  animation: correctPulse 0.5s ease;
}
@keyframes correctPulse {
  0% { transform: scale(1); }
  30% { transform: scale(1.05); }
  100% { transform: scale(1); }
}
.player-card.wrong-flash {
  animation: wrongShake 0.4s ease;
}
@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

.player-header {
  display: flex; align-items: center; gap: 0.5rem;
  width: 100%;
}
.player-dot {
  width: 12px; height: 12px; border-radius: 50%;
  flex-shrink: 0;
}
.player-dot.p1 { background: var(--p1); box-shadow: 0 0 10px var(--p1); }
.player-dot.p2 { background: var(--p2); box-shadow: 0 0 10px var(--p2); }
.player-dot.p3 { background: var(--p3); box-shadow: 0 0 10px var(--p3); }
.player-dot.p4 { background: var(--p4); box-shadow: 0 0 10px var(--p4); }
.player-name {
  font-weight: 700; font-size: 1.1rem;
  flex: 1;
}
.player-score {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.5rem; font-weight: 900;
}
.player-score.p1 { color: var(--p1); }
.player-score.p2 { color: var(--p2); }
.player-score.p3 { color: var(--p3); }
.player-score.p4 { color: var(--p4); }
.player-options {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}
.option-btn {
  padding: 0.7rem 0.75rem;
  border-radius: 10px;
  border: 2px solid #ffffff15;
  background: var(--surface2);
  color: #fff;
  font-size: 0.95rem;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer;
  transition: all 0.15s ease;
  letter-spacing: 0.03em;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.option-btn .opt-label {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: #ffffff15;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  flex-shrink: 0;
}
.option-btn .opt-text {
  flex: 1;
  word-break: break-word;
}
.option-btn.chosen-correct .opt-label,
.option-btn.chosen-wrong .opt-label {
  background: transparent;
  color: #fff;
}
.option-btn.chosen-correct .opt-label {
  background: #00e676;
}
.option-btn.chosen-wrong .opt-label {
  background: #ff3b5c;
}
.option-btn:hover {
  border-color: #ffffff50;
  background: #ffffff08;
  transform: translateY(-2px);
}
.option-btn:active { transform: scale(0.96); }
.player-card.p1 .option-btn:hover { border-color: var(--p1); box-shadow: 0 0 12px var(--p1-glow); }
.player-card.p2 .option-btn:hover { border-color: var(--p2); box-shadow: 0 0 12px var(--p2-glow); }
.player-card.p3 .option-btn:hover { border-color: var(--p3); box-shadow: 0 0 12px var(--p3-glow); }
.player-card.p4 .option-btn:hover { border-color: var(--p4); box-shadow: 0 0 12px var(--p4-glow); }
.option-btn.chosen-correct {
  border-color: #00e676 !important;
  background: #00e67620 !important;
  box-shadow: 0 0 20px #00e67660 !important;
  animation: correctPulse 0.5s ease;
}
.option-btn.chosen-wrong {
  border-color: #ff3b5c !important;
  background: #ff3b5c20 !important;
  animation: wrongShake 0.4s ease;
}
.option-btn.disabled {
  pointer-events: none;
  opacity: 0.4;
}

/* ============ 2P MODE: BRIGHT ARENA ============ */
body[data-mode="2p"] #start-screen {
  background: linear-gradient(135deg, #ffe5eb 0%, #e5f0ff 50%, #ffe5eb 100%);
}
body[data-mode="2p"] .start-title {
  background: linear-gradient(135deg, #ff3b5c, #ff6b8b, #3399ff, #66b2ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-size: clamp(3rem, 7vw, 5.5rem);
}
body[data-mode="2p"] .start-subtitle {
  color: #888;
}
body[data-mode="2p"] .start-btn {
  background: linear-gradient(135deg, #ff3b5c, #3399ff);
  box-shadow: 0 6px 40px rgba(255,59,92,0.35), 0 6px 40px rgba(51,153,255,0.25);
  font-size: 1.5rem;
  padding: 1.2rem 4rem;
}
body[data-mode="2p"] .start-btn:hover {
  box-shadow: 0 10px 50px rgba(255,59,92,0.5), 0 10px 50px rgba(51,153,255,0.4);
}
body[data-mode="2p"] #game-screen {
  background: linear-gradient(180deg, #f8f9fc 0%, #eef1f6 100%);
}
body[data-mode="2p"] .question-label {
  color: #999;
  font-weight: 600;
}
body[data-mode="2p"] .question-word {
  color: #222;
  text-shadow: none;
  font-size: clamp(2rem, 4vw, 3rem);
}
body[data-mode="2p"] .round-indicator {
  color: #888;
}
body[data-mode="2p"] .round-indicator span {
  color: #ff3b5c;
}
/* 2P Player cards — full color fill */
body[data-mode="2p"] .player-card.p1 {
  background: linear-gradient(180deg, #ff5e7e 0%, #ff3b5c 100%);
  border: none;
  box-shadow: 0 8px 32px rgba(255,59,92,0.3);
}
body[data-mode="2p"] .player-card.p2 {
  background: linear-gradient(180deg, #5ba4ff 0%, #3399ff 100%);
  border: none;
  box-shadow: 0 8px 32px rgba(51,153,255,0.3);
}
body[data-mode="2p"] .player-card.p1.active,
body[data-mode="2p"] .player-card.p2.active {
  box-shadow: 0 12px 40px rgba(0,0,0,0.2);
}
body[data-mode="2p"] .player-card.p1::before,
body[data-mode="2p"] .player-card.p2::before {
  opacity: 0;
}
body[data-mode="2p"] .player-name,
body[data-mode="2p"] .player-score {
  color: #fff;
}
body[data-mode="2p"] .player-score {
  font-size: 2rem;
  text-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
body[data-mode="2p"] .player-dot.p1,
body[data-mode="2p"] .player-dot.p2 {
  background: #fff;
  box-shadow: 0 0 10px rgba(255,255,255,0.6);
}
/* 2P option buttons — white cards inside colored areas */
body[data-mode="2p"] .option-btn {
  background: rgba(255,255,255,0.95);
  border: 2px solid rgba(255,255,255,0.6);
  color: #333;
  border-radius: 12px;
  padding: 0.8rem 1rem;
  font-weight: 600;
}
body[data-mode="2p"] .option-btn:hover {
  background: #fff;
  border-color: #fff;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  transform: translateY(-2px);
}
body[data-mode="2p"] .player-card.p1 .option-btn:hover {
  border-color: var(--p1);
  box-shadow: 0 4px 16px rgba(255,59,92,0.3);
}
body[data-mode="2p"] .player-card.p2 .option-btn:hover {
  border-color: var(--p2);
  box-shadow: 0 4px 16px rgba(51,153,255,0.3);
}
body[data-mode="2p"] .option-btn .opt-label {
  background: rgba(0,0,0,0.06);
  color: #666;
}
body[data-mode="2p"] .player-hint {
  color: rgba(255,255,255,0.7);
}
body[data-mode="2p"] .progress-dot {
  background: rgba(255,255,255,0.35);
}
body[data-mode="2p"] .progress-dot.done {
  background: #fff;
}
body[data-mode="2p"] .progress-dot.missed {
  background: rgba(255,255,255,0.35);
}
body[data-mode="2p"] .timer-ring .bg { stroke: rgba(0,0,0,0.08); }
body[data-mode="2p"] .timer-ring .fg { stroke: #ff3b5c; }
body[data-mode="2p"] .timer-ring .fg.urgent { stroke: #ff3b5c; }
body[data-mode="2p"] .timer-text { color: #333; }
body[data-mode="2p"] .timer-text.urgent { color: #ff3b5c; }

/* ============ 3P/4P MODE: MULTI-COLOR ============ */
body[data-mode="multi"] #start-screen {
  background: linear-gradient(135deg, #fff5f0 0%, #f0f5ff 50%, #f5fff0 100%);
}
body[data-mode="multi"] .start-title {
  background: linear-gradient(135deg, #ff3b5c, #ff9100, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
body[data-mode="multi"] .start-btn {
  background: linear-gradient(135deg, #ff3b5c, #ff9100);
  box-shadow: 0 6px 30px rgba(255,59,92,0.3);
}
body[data-mode="multi"] .start-btn:hover {
  box-shadow: 0 10px 40px rgba(255,59,92,0.5);
}
body[data-mode="multi"] #game-screen {
  background: linear-gradient(180deg, #f8f9fc 0%, #eef1f6 100%);
}
body[data-mode="multi"] .question-word {
  color: #222;
  text-shadow: none;
}
body[data-mode="multi"] .player-card.p1 {
  background: linear-gradient(180deg, #ff6b8b 0%, #ff3b5c 100%);
  border: none;
}
body[data-mode="multi"] .player-card.p2 {
  background: linear-gradient(180deg, #66b2ff 0%, #3399ff 100%);
  border: none;
}
body[data-mode="multi"] .player-card.p3 {
  background: linear-gradient(180deg, #33ff99 0%, #00e676 100%);
  border: none;
}
body[data-mode="multi"] .player-card.p4 {
  background: linear-gradient(180deg, #ffb233 0%, #ff9100 100%);
  border: none;
}
body[data-mode="multi"] .player-card::before {
  opacity: 0;
}
body[data-mode="multi"] .player-name,
body[data-mode="multi"] .player-score {
  color: #fff;
}
body[data-mode="multi"] .player-dot {
  background: #fff;
  box-shadow: 0 0 10px rgba(255,255,255,0.6);
}
body[data-mode="multi"] .option-btn {
  background: rgba(255,255,255,0.95);
  border: 2px solid rgba(255,255,255,0.6);
  color: #333;
  font-weight: 600;
}
body[data-mode="multi"] .option-btn:hover {
  background: #fff;
  border-color: #fff;
}
body[data-mode="multi"] .player-hint {
  color: rgba(255,255,255,0.7);
}
body[data-mode="multi"] .progress-dot {
  background: rgba(255,255,255,0.35);
}
body[data-mode="multi"] .progress-dot.done {
  background: #fff;
}
.player-hint {
  font-size: 0.75rem; color: var(--text-dim);
  text-align: center;
}
.player-progress {
  width: 100%; display: flex; gap: 4px;
}
.progress-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #ffffff15;
  transition: all 0.3s;
}
.progress-dot.done { background: #00e676; box-shadow: 0 0 6px #00e676; }
.progress-dot.missed { background: #ff3b5c; }

/* ============ RESULT SCREEN ============ */
#result-screen {
  background: linear-gradient(135deg, #f8f9fc 0%, #eef1f6 100%);
}
.result-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 900;
  margin-bottom: 2rem;
  letter-spacing: 0.05em;
  color: #222;
}
.result-title .winner-name {
  background: linear-gradient(135deg, #ff3b5c, #3399ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.ranking-list {
  display: flex; flex-direction: column; gap: 0.75rem;
  width: 100%; max-width: 500px;
  margin-bottom: 2rem;
}
.rank-item {
  display: flex; align-items: center; gap: 1rem;
  padding: 1rem 1.5rem;
  border-radius: 16px;
  background: #fff;
  border: 2px solid #e0e0e0;
  transition: all 0.3s;
  color: #333;
}
.rank-item.winner {
  border-color: #ffd700;
  background: linear-gradient(135deg, #fff9e6, #fff3cc);
  box-shadow: 0 0 30px rgba(255,215,0,0.3);
  animation: winnerGlow 2s ease infinite;
}
@keyframes winnerGlow {
  0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.3); }
  50% { box-shadow: 0 0 50px rgba(255,215,0,0.5); }
}
.rank-num {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.5rem; font-weight: 900;
  width: 40px; text-align: center;
}
.rank-num.gold { color: #ff9100; }
.rank-num.silver { color: #999; }
.rank-num.bronze { color: #cd7f32; }
.rank-info { flex: 1; }
.rank-name { font-weight: 700; font-size: 1.1rem; }
.rank-detail { font-size: 0.85rem; color: #888; }
.rank-score {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.3rem; font-weight: 700;
  color: #ff3b5c;
}
.restart-btn {
  padding: 0.85rem 2.5rem;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg, #ff3b5c, #3399ff);
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem; font-weight: 700;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(255,59,92,0.3);
}
.restart-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(255,59,92,0.5);
}

/* ============ PARTICLES ============ */
.particle {
  position: fixed;
  pointer-events: none;
  z-index: 100;
  animation: particleFly 1s ease-out forwards;
}
@keyframes particleFly {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
}

/* ============ CONFETTI ============ */
.confetti-piece {
  position: fixed;
  pointer-events: none;
  z-index: 100;
  animation: confettiFall var(--duration) ease-in forwards;
}
@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(-10vh) rotate(0deg); }
  100% { opacity: 0; transform: translateY(110vh) rotate(var(--rot)); }
}

/* ============ FLOATING PRAISE ============ */
.praise-word {
  position: fixed;
  pointer-events: none;
  z-index: 200;
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.8rem, 3vw, 3rem);
  font-weight: 900;
  text-shadow: 0 0 30px currentColor;
  animation: praiseFloat 1.5s ease-out forwards;
}
@keyframes praiseFloat {
  0% { opacity: 0; transform: translate(-50%, 0) scale(0.3); }
  15% { opacity: 1; transform: translate(-50%, -20px) scale(1.2); }
  30% { transform: translate(-50%, -40px) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -120px) scale(0.8); }
}

/* ============ RESPONSIVE ============ */
@media (max-width: 768px) {
  .players-grid.cols-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .players-grid.cols-3 { grid-template-columns: 1fr; grid-template-rows: auto; }
  .player-card { padding: 0.75rem; }
  .question-word { font-size: 2rem; }
  .timer-ring-container { width: 60px; height: 60px; }
  .timer-ring { width: 60px; height: 60px; }
  .timer-text { font-size: 1.4rem; }
}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen" class="screen">
  <h1 class="start-title">WORD ARENA</h1>
  <p class="start-subtitle">英语单词PK大擂台</p>
  <div class="player-count-selector">
    <button class="count-btn active" data-count="2">2P</button>
    <button class="count-btn" data-count="3">3P</button>
    <button class="count-btn" data-count="4">4P</button>
  </div>
  <div class="name-inputs" id="name-inputs">
    <div class="name-row"><span class="dot" style="background:var(--p1);box-shadow:0 0 10px var(--p1)"></span><input type="text" placeholder="玩家 1" maxlength="8" data-p="1"></div>
    <div class="name-row"><span class="dot" style="background:var(--p2);box-shadow:0 0 10px var(--p2)"></span><input type="text" placeholder="玩家 2" maxlength="8" data-p="2"></div>
  </div>
  <button class="start-btn" id="start-btn">开 始 PK</button>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen hidden">
  <div class="game-top-bar">
    <div class="round-indicator">第 <span id="round-num">1</span> / 10 题</div>
  </div>
  <div class="question-zone">
    <div class="question-label">请选择对应的英文单词</div>
    <div class="question-word" id="question-word"></div>
    <div class="timer-ring-container">
      <svg class="timer-ring" viewBox="0 0 80 80">
        <circle class="bg" cx="40" cy="40" r="34"/>
        <circle class="fg" id="timer-fg" cx="40" cy="40" r="34"
          stroke-dasharray="213.6" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text" id="timer-text">6</div>
    </div>
  </div>
  <div class="players-grid" id="players-grid"></div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen" class="screen hidden">
  <div class="result-title">🏆 <span class="winner-name" id="winner-name"></span> 获胜！</div>
  <div class="ranking-list" id="ranking-list"></div>
  <button class="restart-btn" id="restart-btn">再来一局</button>
</div>

<script>
const WORDS = [
  { en: 'devoted', zh: '奉献的' },
  { en: 'persistent', zh: '坚持不懈的' },
  { en: 'committed', zh: '尽心尽力的' },
  { en: 'selfless', zh: '无私的' },
  { en: 'determined', zh: '坚定的' },
  { en: 'inspiring', zh: '鼓舞人心的' },
  { en: 'responsible', zh: '有责任感的' },
  { en: 'courageous', zh: '勇敢的' },
  { en: 'thoughtful', zh: '深思熟虑的；体贴的' },
  { en: 'strong-minded', zh: '意志坚定的' },
];

const PRAISE_WORDS = ['Amazing!', 'Perfect!', 'Great!', 'Excellent!', 'Brilliant!', 'Wonderful!', 'Awesome!', 'Fantastic!'];

// ============ AUDIO ENGINE ============
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playCorrectSound() {
  try {
    const ctx = getAudioCtx(), now = ctx.currentTime;
    [523.25, 659.25, 783.99].forEach((freq, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime(0.3, now + i * 0.08);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.3);
      o.connect(g); g.connect(ctx.destination);
      o.start(now + i * 0.08); o.stop(now + i * 0.08 + 0.3);
    });
  } catch(e) {}
}
function playWrongSound() {
  try {
    const ctx = getAudioCtx(), now = ctx.currentTime;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'square'; o.frequency.setValueAtTime(200, now);
    o.frequency.linearRampToValueAtTime(150, now + 0.15);
    g.gain.setValueAtTime(0.15, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    o.connect(g); g.connect(ctx.destination);
    o.start(now); o.stop(now + 0.25);
  } catch(e) {}
}
function showFloatingPraise(cardEl) {
  const r = cardEl.getBoundingClientRect(),
    praise = PRAISE_WORDS[Math.floor(Math.random() * PRAISE_WORDS.length)],
    clrs = ['#ffd700','#ff3b5c','#00e676','#00c6ff','#ff9100','#ff6b9d'],
    el = document.createElement('div');
  el.className = 'praise-word'; el.textContent = praise;
  el.style.left = (r.left + r.width/2) + 'px';
  el.style.top = (r.top + r.height/2) + 'px';
  el.style.color = clrs[Math.floor(Math.random() * clrs.length)];
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

// 生成干扰项
function generateOptions(correctWord) {
  const allWords = WORDS.map(w => w.en);
  const wrongWords = allWords.filter(w => w !== correctWord);
  const shuffled = [...wrongWords].sort(() => Math.random() - 0.5);
  const options = [correctWord, ...shuffled.slice(0, 3)];
  return options.sort(() => Math.random() - 0.5);
}

const PLAYER_COLORS = ['p1', 'p2', 'p3', 'p4'];
const PLAYER_COLORS_HEX = ['#ff3b5c', '#3399ff', '#00e676', '#ff9100'];
const TIME_PER_QUESTION = 6;
const TOTAL_QUESTIONS = 10;

let state = {
  playerCount: 2,
  playerNames: [],
  scores: [],
  times: [],
  currentQuestion: 0,
  questionOrder: [],
  timerInterval: null,
  timeLeft: 0,
  questionStartTime: 0,
  answered: false,
  gameOver: false,
  currentOptions: [], // 当前题目的选项数组
};

// ============ DOM REFS ============
const $startScreen = document.getElementById('start-screen');
const $gameScreen = document.getElementById('game-screen');
const $resultScreen = document.getElementById('result-screen');
const $nameInputs = document.getElementById('name-inputs');
const $playersGrid = document.getElementById('players-grid');
const $questionWord = document.getElementById('question-word');
const $timerFg = document.getElementById('timer-fg');
const $timerText = document.getElementById('timer-text');
const $roundNum = document.getElementById('round-num');
const $winnerName = document.getElementById('winner-name');
const $rankingList = document.getElementById('ranking-list');

// ============ START SCREEN ============
document.body.setAttribute('data-mode', '2p');

document.querySelectorAll('.count-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const count = parseInt(btn.dataset.count);
    state.playerCount = count;
    document.body.setAttribute('data-mode', count === 2 ? '2p' : 'multi');
    renderNameInputs(count);
  });
});

function renderNameInputs(count) {
  $nameInputs.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const row = document.createElement('div');
    row.className = 'name-row';
    row.innerHTML = `
      <span class="dot" style="background:${PLAYER_COLORS_HEX[i]};box-shadow:0 0 10px ${PLAYER_COLORS_HEX[i]}"></span>
      <input type="text" placeholder="玩家 ${i + 1}" maxlength="8" data-p="${i}">
    `;
    $nameInputs.appendChild(row);
  }
}

document.getElementById('start-btn').addEventListener('click', startGame);

function startGame() {
  const inputs = $nameInputs.querySelectorAll('input');
  state.playerNames = [];
  inputs.forEach((inp, i) => {
    state.playerNames.push(inp.value.trim() || `玩家 ${i + 1}`);
  });
  state.scores = new Array(state.playerCount).fill(0);
  state.times = new Array(state.playerCount).fill(0);
  state.currentQuestion = 0;
  state.gameOver = false;

  // Shuffle questions
  state.questionOrder = [...Array(TOTAL_QUESTIONS).keys()];
  for (let i = state.questionOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [state.questionOrder[i], state.questionOrder[j]] = [state.questionOrder[j], state.questionOrder[i]];
  }

  renderGameBoard();
  showScreen('game');
  setTimeout(() => loadQuestion(), 600);
}

// ============ GAME BOARD ============
function renderGameBoard() {
  $playersGrid.className = 'players-grid';
  if (state.playerCount === 2) $playersGrid.classList.add('cols-2');
  else if (state.playerCount === 3) $playersGrid.classList.add('cols-3');
  else $playersGrid.classList.add('cols-4');

  $playersGrid.innerHTML = '';
  for (let i = 0; i < state.playerCount; i++) {
    const card = document.createElement('div');
    card.className = `player-card ${PLAYER_COLORS[i]}`;
    card.id = `player-card-${i}`;
    card.innerHTML = `
      <div class="player-header">
        <span class="player-dot ${PLAYER_COLORS[i]}"></span>
        <span class="player-name">${state.playerNames[i]}</span>
        <span class="player-score ${PLAYER_COLORS[i]}" id="score-${i}">0</span>
      </div>
      <div class="player-options" id="options-${i}">
        <button class="option-btn" data-idx="0"><span class="opt-label">A</span><span class="opt-text">---</span></button>
        <button class="option-btn" data-idx="1"><span class="opt-label">B</span><span class="opt-text">---</span></button>
        <button class="option-btn" data-idx="2"><span class="opt-label">C</span><span class="opt-text">---</span></button>
        <button class="option-btn" data-idx="3"><span class="opt-label">D</span><span class="opt-text">---</span></button>
      </div>
      <div class="player-hint">点击选项作答</div>
      <div class="player-progress" id="progress-${i}">
        ${'<span class="progress-dot"></span>'.repeat(TOTAL_QUESTIONS)}
      </div>
    `;
    $playersGrid.appendChild(card);

    // Bind option click events
    const optionsContainer = card.querySelector('.player-options');
    optionsContainer.addEventListener('click', (e) => {
      const btn = e.target.closest('.option-btn');
      if (!btn || state.answered || state.gameOver) return;
      const optionIdx = parseInt(btn.dataset.idx);
      const chosenWord = state.currentOptions[optionIdx];
      handleSubmit(i, chosenWord, btn);
    });
  }
}

// ============ QUESTION LOGIC ============
function loadQuestion() {
  if (state.currentQuestion >= TOTAL_QUESTIONS) {
    endGame();
    return;
  }

  state.answered = false;
  const wordIdx = state.questionOrder[state.currentQuestion];
  const word = WORDS[wordIdx];
  $questionWord.textContent = word.zh;
  $roundNum.textContent = state.currentQuestion + 1;

  // Generate options and store
  state.currentOptions = generateOptions(word.en);

  // Reset options for all players
  for (let i = 0; i < state.playerCount; i++) {
    const optionsEl = document.getElementById(`options-${i}`);
    if (optionsEl) {
      const btns = optionsEl.querySelectorAll('.option-btn');
      btns.forEach((btn, idx) => {
        const optText = btn.querySelector('.opt-text');
        if (optText) optText.textContent = state.currentOptions[idx];
        btn.className = 'option-btn';
        btn.disabled = false;
      });
    }
    const card = document.getElementById(`player-card-${i}`);
    if (card) card.classList.remove('correct-flash', 'wrong-flash');
  }

  // Start timer
  state.timeLeft = TIME_PER_QUESTION;
  state.questionStartTime = Date.now();
  updateTimerDisplay();
  startTimer();
}

function startTimer() {
  clearInterval(state.timerInterval);
  const circumference = 213.6;
  $timerFg.style.strokeDashoffset = '0';
  $timerFg.classList.remove('urgent');
  $timerText.classList.remove('urgent');

  state.timerInterval = setInterval(() => {
    state.timeLeft -= 0.1;
    if (state.timeLeft <= 0) {
      state.timeLeft = 0;
      clearInterval(state.timerInterval);
      if (!state.answered) handleTimeout();
    }
    updateTimerDisplay();
  }, 100);
}

function updateTimerDisplay() {
  const circumference = 213.6;
  const offset = circumference * (1 - state.timeLeft / TIME_PER_QUESTION);
  $timerFg.style.strokeDashoffset = offset;
  $timerText.textContent = Math.ceil(state.timeLeft);

  if (state.timeLeft <= 2) {
    $timerFg.classList.add('urgent');
    $timerText.classList.add('urgent');
  }
}

function handleSubmit(playerIdx, answer, clickedBtn = null) {
  if (state.answered || state.gameOver) return;

  const wordIdx = state.questionOrder[state.currentQuestion];
  const correctWord = WORDS[wordIdx].en;
  const isCorrect = answer === correctWord;
  const now = Date.now();
  const timeUsed = (now - state.questionStartTime) / 1000;

  // Mark clicked button
  if (clickedBtn) {
    clickedBtn.classList.add(isCorrect ? 'chosen-correct' : 'chosen-wrong');
  }

  // Disable all options for this player
  const optionsEl = document.getElementById(`options-${playerIdx}`);
  if (optionsEl) {
    const btns = optionsEl.querySelectorAll('.option-btn');
    btns.forEach(btn => {
      btn.classList.add('disabled');
    });
  }

  if (isCorrect && !state.answered) {
    state.answered = true;
    state.scores[playerIdx]++;
    state.times[playerIdx] += timeUsed;
    document.getElementById(`score-${playerIdx}`).textContent = state.scores[playerIdx];
    const progressDots = document.querySelectorAll(`#progress-${playerIdx} .progress-dot`);
    if (progressDots[state.currentQuestion]) progressDots[state.currentQuestion].classList.add('done');

    const card = document.getElementById(`player-card-${playerIdx}`);
    if (card) card.classList.add('correct-flash');
    spawnParticles(card);
    playCorrectSound();
    showFloatingPraise(card);

    // Show correct answer on other players' cards
    for (let i = 0; i < state.playerCount; i++) {
      if (i === playerIdx) continue;
      const otherOptions = document.getElementById(`options-${i}`);
      if (otherOptions) {
        const btns = otherOptions.querySelectorAll('.option-btn');
        btns.forEach(btn => {
          const optText = btn.querySelector('.opt-text');
          if (optText && optText.textContent === correctWord) {
            btn.classList.add('chosen-correct');
          }
          btn.classList.add('disabled');
        });
      }
    }

    clearInterval(state.timerInterval);
    setTimeout(() => {
      state.currentQuestion++;
      loadQuestion();
    }, 1500);
  } else if (!isCorrect) {
    const card = document.getElementById(`player-card-${playerIdx}`);
    if (card) card.classList.add('wrong-flash');
    playWrongSound();
    const progressDots = document.querySelectorAll(`#progress-${playerIdx} .progress-dot`);
    if (progressDots[state.currentQuestion]) progressDots[state.currentQuestion].classList.add('missed');
  }
}

function handleTimeout() {
  state.answered = true;
  for (let i = 0; i < state.playerCount; i++) {
    const progressDots = document.querySelectorAll(`#progress-${i} .progress-dot`);
    if (progressDots[state.currentQuestion]) progressDots[state.currentQuestion].classList.add('missed');
    const optionsEl = document.getElementById(`options-${i}`);
    if (optionsEl) {
      const btns = optionsEl.querySelectorAll('.option-btn');
      btns.forEach(btn => btn.classList.add('disabled'));
    }
  }
  setTimeout(() => {
    state.currentQuestion++;
    loadQuestion();
  }, 600);
}

// ============ END GAME ============
function endGame() {
  state.gameOver = true;
  clearInterval(state.timerInterval);

  // Build ranking
  const players = state.playerNames.map((name, i) => ({
    name, score: state.scores[i], time: state.times[i], idx: i
  }));
  players.sort((a, b) => {
    if (b.score !== a.score) return b.score - a.score;
    return a.time - b.time;
  });

  $winnerName.textContent = players[0].name;
  $rankingList.innerHTML = '';
  const medals = ['gold', 'silver', 'bronze'];
  players.forEach((p, rank) => {
    const div = document.createElement('div');
    div.className = 'rank-item';
    if (rank === 0) div.classList.add('winner');
    const medalClass = rank < 3 ? medals[rank] : '';
    div.innerHTML = `
      <span class="rank-num ${medalClass}">#${rank + 1}</span>
      <span class="player-dot ${PLAYER_COLORS[p.idx]}" style="display:inline-block;width:12px;height:12px;border-radius:50%;flex-shrink:0;"></span>
      <div class="rank-info">
        <div class="rank-name">${p.name}</div>
        <div class="rank-detail">用时 ${p.time.toFixed(1)}s</div>
      </div>
      <span class="rank-score">${p.score} 分</span>
    `;
    $rankingList.appendChild(div);
  });

  showScreen('result');
  spawnConfetti();
}

// ============ PARTICLES ============
function spawnParticles(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const colors = ['#ffd700', '#ff9100', '#ff3b5c', '#00e676', '#00c6ff', '#fff'];

  for (let i = 0; i < 20; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    const angle = Math.random() * Math.PI * 2;
    const dist = 40 + Math.random() * 80;
    particle.style.cssText = `
      left: ${cx}px; top: ${cy}px;
      width: ${4 + Math.random() * 8}px;
      height: ${4 + Math.random() * 8}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      border-radius: 50%;
      --dx: ${Math.cos(angle) * dist}px;
      --dy: ${Math.sin(angle) * dist}px;
    `;
    document.body.appendChild(particle);
    setTimeout(() => particle.remove(), 1000);
  }
}

function spawnConfetti() {
  const colors = ['#ff3b5c', '#00c6ff', '#00e676', '#ff9100', '#ffd700', '#ff6b9d', '#7cff6b'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.cssText = `
      left: ${Math.random() * 100}vw;
      top: -5vh;
      width: ${6 + Math.random() * 10}px;
      height: ${6 + Math.random() * 14}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      --duration: ${2 + Math.random() * 3}s;
      --rot: ${Math.random() * 720 - 360}deg;
      animation-delay: ${Math.random() * 0.8}s;
    `;
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 4000);
  }
}

// ============ SCREEN SWITCHING ============
function showScreen(name) {
  [$startScreen, $gameScreen, $resultScreen].forEach(s => s.classList.add('hidden'));
  if (name === 'start') $startScreen.classList.remove('hidden');
  else if (name === 'game') $gameScreen.classList.remove('hidden');
  else if (name === 'result') $resultScreen.classList.remove('hidden');
}

// ============ RESTART ============
document.getElementById('restart-btn').addEventListener('click', () => {
  showScreen('start');
});

// ============ KEYBOARD SHORTCUT ============
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !state.gameOver && !state.answered) {
    // Find which input is focused
    const activeEl = document.activeElement;
    if (activeEl && activeEl.classList.contains('player-input')) {
      const playerIdx = parseInt(activeEl.id.split('-')[1]);
      handleSubmit(playerIdx, activeEl.value.trim());
    }
  }
});
</script>
</body>
</html>
